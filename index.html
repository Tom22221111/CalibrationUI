<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrix Calibration Workbench</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX transpilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* bg-slate-50 equivalent */
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useMemo, useState } = React;

        /* =========================
           MOCK DATA
        ========================= */

        const signalDiagnosticsMock = {
          layers: [
            {
              id: "layer1",
              title: "LAYER 1 — SIGNAL EXTRACTION",
              signals: [
                {
                  id: "A",
                  name: "Reservation Commitment",
                  result: "FALSE",
                  reasoning: "No quote in this set contains a customer agreement to reserve.",
                },
                {
                  id: "B",
                  name: "Reservation Declined / Not Secured",
                  result: "TRUE",
                  reasoning: {
                    patterns: [
                      {
                        name: "Pattern 1 (Reservation Delay Statement)",
                        details: "Detected in multiple segments.",
                        quotes: [
                          { text: "Yeah, well, I'm going to have a word with her, see what she thinks.", segment: "106" },
                          { text: "No, because I'll get back to you quite quickly.", segment: "109" }
                        ],
                        tokens: ['"word with her" (Person Reference)', '"thinks" (Delay Indicator)', '"get back to you" (Delay Indicator)']
                      }
                    ]
                  }
                },
                {
                  id: "C",
                  name: "Callback Arrangement",
                  result: "TRUE",
                  reasoning: {
                    patterns: [
                      {
                        name: "Pattern 5 (Conditional Callback Commitment)",
                        details: "Detected in Segment 114.",
                        quotes: [
                          { text: "If I don't hear back for you after you spoke to your daughter, I'll give you a wee follow-up call in [REDACTED].", segment: "114" }
                        ],
                        tokens: [
                          { type: "CONDITIONAL_TRIGGER", text: "after you spoke to" },
                          { type: "CALLBACK_VERB", text: "follow-up call" },
                          { type: "CUSTOMER_REFERENCE", text: "you" }
                        ]
                      }
                    ]
                  }
                },
                {
                  id: "D",
                  name: "Email Follow-Up",
                  result: "FALSE",
                  reasoning: "No email-specific action (\"send email\", \"forward details\") is present in this specific set of 5 candidate quotes.",
                }
              ]
            },
            {
              id: "layer2",
              title: "LAYER 2 — QUALIFICATION GATE",
              logicPath: [
                { step: "1", query: "Signal A = TRUE?", response: "No (FALSE)." },
                { step: "2", query: "Failure Condition: ELSE IF Signal B = TRUE AND Signal C = FALSE?", response: "No (Both B and C are TRUE)." },
                { step: "3", query: "Email Clarification Rule: ELSE IF Signal B = TRUE AND Signal C = TRUE?", response: "Yes." }
              ],
              result: {
                label: "rule_present",
                value: "FALSE",
                explanation: "Although the reservation was not secured (Signal B), the Advisor successfully arranged a conditional follow-up call (Signal C). Under this logic, a callback \"passes\" the rule, even if an email wasn't offered or detected in this specific segment."
              }
            }
          ]
        };

        const tenCalls = [
          { id: "Call 01", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 02", expected: "Detect", actual: "Not Detect", status: "Mismatch" },
          { id: "Call 03", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 04", expected: "Do Not Detect", actual: "Detect", status: "Mismatch" },
          { id: "Call 05", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 06", expected: "Detect", actual: "Not Detect", status: "Mismatch" },
          { id: "Call 07", expected: "Do Not Detect", actual: "Do Not Detect", status: "Correct" },
          { id: "Call 08", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 09", expected: "Do Not Detect", actual: "Detect", status: "Manager Query" },
          { id: "Call 10", expected: "Detect", actual: "Detect", status: "Correct" },
        ];

        /* =========================
           UI HELPERS
        ========================= */

        function Badge({ status }) {
          const map = {
            Correct: "bg-emerald-50 text-emerald-700",
            Mismatch: "bg-rose-50 text-rose-700",
            "Manager Query": "bg-amber-50 text-amber-700",
            TRUE: "bg-emerald-50 text-emerald-700",
            FALSE: "bg-rose-50 text-rose-700",
          };

          return (
            <span
              className={`rounded-full px-2 py-1 text-xs font-medium ${
                map[status] || "bg-slate-100 text-slate-600"
              }`}
            >
              {status}
            </span>
          );
        }

        /* =========================
           SIDEBAR
        ========================= */

        function Sidebar({ page, setPage }) {
          const navStructure = [
            { name: "Onboarding Wizard" },
            { name: "Dashboard" },
            { name: "Pattern Library" },
            { name: "Prompt System" },
            {
              category: "Calibration",
              items: [
                { name: "Rule Creation Flow" },
                { name: "Calibration Levers" },
                { name: "Lever Ontology" },
                { name: "Log Schema" },
              ]
            },
            { name: "Example Rule Format" }
          ];

          return (
            <div className="w-64 border-r bg-white p-6 min-h-screen">
              <div className="mb-8 text-xl font-bold flex items-center gap-2">
                <div className="h-2 w-2 rounded-full bg-pink-500"></div>
                Metrix Calibration
              </div>
              <div className="space-y-6">
                {navStructure.map((section, idx) => (
                  section.category ? (
                    <div key={idx} className="space-y-2">
                       <div className="px-3 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-1">{section.category}</div>
                       <div className="space-y-1">
                          {section.items.map(item => (
                            <div
                              key={item.name}
                              onClick={() => setPage(item.name)}
                              className={`cursor-pointer rounded-lg px-3 py-2 text-sm transition-all ${
                                page === item.name ? "bg-pink-50 text-pink-600 font-bold" : "text-slate-600 hover:bg-slate-50"
                              }`}
                            >
                              {item.name}
                            </div>
                          ))}
                       </div>
                    </div>
                  ) : (
                    <div
                      key={section.name}
                      onClick={() => setPage(section.name)}
                      className={`cursor-pointer rounded-lg px-3 py-2 text-sm transition-all ${
                        page === section.name ? "bg-pink-50 text-pink-600 font-bold" : "text-slate-600 hover:bg-slate-50"
                      }`}
                    >
                      {section.name}
                    </div>
                  )
                ))}
              </div>
            </div>
          );
        }

        /* =========================
           ONBOARDING WIZARD
        ========================= */

        const wizardSteps = [
          "Add Rule(s)",
          "Pattern Classification",
          "Rule Engineering",
          "Keyword Retrieval",
          "Client Example Coverage",
          "Onboarding Complete",
        ];

        function WizardPage() {
          const [step, setStep] = useState(0);
          const pct = ((step + 1) / wizardSteps.length) * 100;

          const stepContent = [
            {
              title: "Add Detection Rule(s)",
              subtitle: "Paste a single rule or upload a CSV containing many rules at once.",
              body: (
                <div className="grid gap-6 lg:grid-cols-2">
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <div className="mb-2 text-sm text-slate-500">Paste Single Rule</div>
                    <textarea
                      className="h-40 w-full rounded-xl border border-slate-300 p-4 text-sm"
                      defaultValue="Detect whether the advisor asks the customer how they found the company."
                    />
                  </div>
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <div className="mb-2 text-sm text-slate-500">Upload Multiple Rules</div>
                    <div className="rounded-xl border-2 border-dashed border-slate-300 p-10 text-center text-slate-400">
                      Drop CSV here
                    </div>
                  </div>
                </div>
              ),
            },
            {
              title: "Pattern Classification",
              subtitle: "The classifier assigns the rule to a conversational pattern family. If pattern = OTHER, ontology expansion is triggered.",
              body: (
                <div className="grid gap-6 lg:grid-cols-2">
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <div className="text-sm text-slate-500">Suggested Pattern</div>
                    <div className="mt-2 text-lg font-semibold text-slate-900">Question Pattern</div>
                  </div>
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <div className="text-sm text-slate-500">If Pattern = OTHER</div>
                    <ul className="mt-3 list-disc space-y-2 pl-5 text-sm text-slate-600">
                      <li>Update pattern classification library</li>
                      <li>Create new pattern-specific prompt</li>
                      <li>Return to pattern output</li>
                    </ul>
                  </div>
                </div>
              ),
            },
            {
              title: "Deterministic Rule Engineering",
              subtitle: "The pattern-specific engineering prompt converts the raw rule into deterministic signal extraction and qualification logic.",
              body: (
                <div className="rounded-2xl border bg-white p-5 shadow-sm">
                  <div className="rounded-xl bg-slate-50 p-4 text-sm text-slate-700">
                    <div className="font-semibold text-slate-900">Deterministic Rule v1 Preview</div>
                    <div className="mt-2">LAYER 1 — SIGNAL EXTRACTION</div>
                    <div>Signal A: QUESTION_WORD + DISCOVERY_VERB + OBJECT_REFERENCE</div>
                    <div>Signal B: SOURCE_REFERENCE + DISCOVERY_VERB</div>
                    <div className="mt-3">LAYER 2 — QUALIFICATION GATE</div>
                    <div>IF Signal A = TRUE OR Signal B = TRUE → rule_present = TRUE</div>
                  </div>
                </div>
              ),
            },
            {
              title: "Keyword Retrieval Layer",
              subtitle: "Generate Python retrieval hints to reduce transcript size before the first AI pass.",
              body: (
                <div className="rounded-2xl border bg-white p-5 shadow-sm">
                  <div className="flex flex-wrap gap-2">
                    {['how','find','found','source','website','online','google','looking','site','browsing'].map((k) => (
                      <span key={k} className="rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-600">{k}</span>
                    ))}
                  </div>
                </div>
              ),
            },
            {
              title: "Client Example Coverage Mapping",
              subtitle: "Inject quote-level examples before the first 10-call test run.",
              body: (
                <div className="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]">
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <div className="mb-3 text-sm text-slate-500">Required Format</div>
                    <div className="rounded-xl bg-slate-50 p-4 text-sm text-slate-700">Example ID | Label | Speaker | Quote | Context</div>
                    <ul className="mt-4 list-disc space-y-2 pl-5 text-sm text-slate-600">
                      <li>Each row = one behavioural quote</li>
                      <li>Labels = SHOULD_DETECT / SHOULD_NOT_DETECT</li>
                      <li>Do not upload full transcripts</li>
                    </ul>
                  </div>
                  <div className="rounded-2xl border bg-white p-5 shadow-sm">
                    <table className="w-full text-sm">
                      <thead className="text-left text-slate-500">
                        <tr><th className="pb-2">Example</th><th>Label</th><th>Gap</th></tr>
                      </thead>
                      <tbody>
                        <tr className="border-t"><td className="py-2">EX-01</td><td>SHOULD_DETECT</td><td className="text-emerald-600">Covered</td></tr>
                        <tr className="border-t"><td className="py-2">EX-02</td><td>SHOULD_DETECT</td><td className="text-amber-600">Pattern Gap</td></tr>
                        <tr className="border-t"><td className="py-2">EX-03</td><td>SHOULD_NOT_DETECT</td><td className="text-rose-600">Logic Risk</td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              ),
            },
            {
              title: "Onboarding Complete",
              subtitle: "The rule has completed steps 1–7.5 and is ready to enter the sequential calibration queue.",
              body: (
                <div className="rounded-2xl border bg-white p-10 text-center shadow-sm">
                  <div className="text-lg font-semibold text-slate-900">Ready for Calibration</div>
                  <div className="mt-2 text-slate-500">Next step: the active rule moves into the calibration dashboard and is processed one rule at a time.</div>
                  <button className="mt-6 rounded-xl bg-pink-600 px-6 py-3 font-semibold text-white">Send to Calibration Queue</button>
                </div>
              ),
            },
          ][step];

          return (
            <div className="space-y-8 p-10">
              <div>
                <h1 className="text-3xl font-bold">AI Rule Onboarding Wizard</h1>
                <p className="mt-2 text-slate-500">Initial setup flow for steps 1–7.5 before calibration begins.</p>
              </div>

              <div className="flex flex-wrap gap-2">
                {wizardSteps.map((label, i) => (
                  <div key={label} className={`rounded-full px-3 py-1 text-xs ${i === step ? 'bg-pink-50 text-pink-700' : 'border border-slate-200 bg-white text-slate-500'}`}>
                    {i + 1}. {label}
                  </div>
                ))}
              </div>

              <div className="h-2 w-full rounded-full bg-slate-200">
                <div className="h-2 rounded-full bg-pink-500 transition-all" style={{ width: `${pct}%` }} />
              </div>

              <div>
                <h2 className="text-2xl font-bold text-slate-900">{stepContent.title}</h2>
                <p className="mt-2 text-slate-500">{stepContent.subtitle}</p>
                <div className="mt-6">{stepContent.body}</div>
              </div>

              <div className="flex justify-between">
                <button disabled={step === 0} onClick={() => setStep(step - 1)} className="rounded-xl border border-slate-300 px-6 py-3 text-slate-600 disabled:opacity-40">
                  Back
                </button>
                <button disabled={step === wizardSteps.length - 1} onClick={() => setStep(step + 1)} className="rounded-xl bg-pink-500 px-6 py-3 font-semibold text-white disabled:opacity-40">
                  Continue
                </button>
              </div>
            </div>
          );
        }

        /* =========================
           DRILLDOWN
        ========================= */

        function DrilldownModal({ call, onClose }) {
          if (!call) return null;

          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80" onClick={onClose}>
              <div className="h-[90vh] w-[1100px] overflow-y-auto rounded-xl bg-slate-900 p-12 text-slate-100 relative shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="mb-10 flex justify-between items-start border-b border-slate-800 pb-8">
                  <div>
                    <div className="text-xs font-bold uppercase tracking-widest text-pink-500 mb-1">Diagnostic Drilldown</div>
                    <div className="text-4xl font-extrabold text-white">{call.id}</div>
                  </div>
                  <button onClick={onClose} className="bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition-colors">
                    <svg className="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                </div>

                <div className="space-y-16">
                  {signalDiagnosticsMock.layers.map((layer) => (
                    <div key={layer.id} className="space-y-8">
                      <div className="border-b border-slate-700 pb-2">
                        <h2 className="text-sm font-black uppercase tracking-[0.2em] text-slate-400">{layer.title}</h2>
                      </div>

                      {layer.signals && (
                        <div className="space-y-10">
                          {layer.signals.map((sig) => (
                            <div key={sig.id} className="space-y-3">
                              <h3 className="text-lg font-bold text-slate-200">Signal {sig.id}: {sig.name}</h3>
                              <ul className="space-y-2 text-sm">
                                <li className="flex gap-2">
                                  <span className="font-bold text-slate-400">• Result:</span>
                                  <Badge status={sig.result} />
                                </li>
                                <li className="flex flex-col gap-2">
                                  <span className="font-bold text-slate-400">• Reasoning:</span>
                                  {typeof sig.reasoning === 'string' ? (
                                    <span className="text-slate-300">{sig.reasoning}</span>
                                  ) : (
                                    <div className="pl-6 space-y-6 mt-2 border-l-2 border-slate-800">
                                      {sig.reasoning.patterns.map((p, idx) => (
                                        <div key={idx} className="space-y-3">
                                          <div className="font-bold text-slate-200">• {p.name}: <span className="font-normal text-slate-400">{p.details}</span></div>
                                          {p.quotes.map((q, qIdx) => (
                                            <div key={qIdx} className="font-bold text-slate-200">• Quote: <span className="font-normal italic text-slate-300">"{q.text}"</span> <span className="text-slate-500">(Segment {q.segment})</span></div>
                                          ))}
                                          <div className="font-bold text-slate-200">• Tokens: 
                                            <div className="flex flex-wrap gap-2 mt-2 font-normal">
                                              {p.tokens.map((t, tIdx) => (
                                                typeof t === 'string' ? (
                                                  <span key={tIdx} className="text-slate-300">{t}{tIdx < p.tokens.length - 1 ? "," : ""}</span>
                                                ) : (
                                                  <span key={tIdx} className="bg-slate-800 px-2 py-0.5 rounded text-white text-xs border border-slate-700">
                                                    <span className="text-slate-500 font-bold mr-1">{t.type}</span> ("{t.text}")
                                                  </span>
                                                )
                                              ))}
                                            </div>
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </li>
                              </ul>
                            </div>
                          ))}
                        </div>
                      )}

                      {layer.logicPath && (
                        <div className="space-y-8">
                          <div className="space-y-4">
                            <h3 className="text-lg font-bold text-slate-200">Logic Path:</h3>
                            <div className="space-y-2 pl-2">
                              {layer.logicPath.map((lp) => (
                                <div key={lp.step} className="text-sm font-bold text-slate-200">
                                  {lp.step}. {lp.query} <span className="font-normal text-slate-300">{lp.response}</span>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="space-y-4 pt-6 border-t border-slate-800">
                            <h3 className="text-lg font-bold text-slate-200">Result:</h3>
                            <ul className="space-y-3 text-sm">
                              <li className="flex gap-2">
                                <span className="font-bold text-slate-400">• {layer.result.label}:</span>
                                <span className="font-bold text-white uppercase tracking-widest">{layer.result.value}</span>
                              </li>
                              <li className="flex gap-2">
                                <span className="font-bold text-slate-400">• Explanation:</span>
                                <span className="text-slate-300 leading-relaxed">{layer.result.explanation}</span>
                              </li>
                            </ul>
                            <div className="mt-6 flex items-center gap-2">
                              <span className="text-sm font-bold text-slate-200">Final Output:</span>
                              <span className="bg-slate-800 px-3 py-1 rounded text-white text-xs font-mono border border-slate-700">
                                {layer.result.label} = {layer.result.value}
                              </span>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                
                <div className="mt-16 flex justify-end gap-1 px-4 opacity-40 hover:opacity-100 transition-opacity">
                   <button className="text-xs text-slate-500 hover:text-white">Good</button>
                   <button className="text-xs text-slate-500 hover:text-white ml-2">Bad</button>
                </div>
              </div>
            </div>
          );
        }

        /* =========================
           DASHBOARD
        ========================= */

        function DashboardPage() {
          const [activeCall, setActiveCall] = useState(null);
          const [mode, setMode] = useState("AI Assisted");

          const mismatchCount = useMemo(
            () => tenCalls.filter((c) => c.status === "Mismatch").length,
            []
          );

          const modes = ["Manual", "AI Assisted", "Full Automation"];

          return (
            <div className="space-y-8 p-10">
              <div className="flex justify-between items-start">
                <div>
                  <h1 className="text-3xl font-bold">Calibration Command Centre</h1>
                  <p className="mt-2 text-slate-500">
                    Active rule lifecycle, calibration intelligence, governance, retrieval diagnostics, and 10-call testing view.
                  </p>
                </div>
                
                {/* Mode Selector */}
                <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 shadow-inner">
                  {modes.map((m) => (
                    <button
                      key={m}
                      onClick={() => setMode(m)}
                      className={`px-4 py-2 text-sm font-semibold rounded-lg transition-all ${
                        mode === m 
                          ? "bg-white text-pink-600 shadow-sm ring-1 ring-slate-200" 
                          : "text-slate-500 hover:text-slate-700"
                      }`}
                    >
                      {m}
                    </button>
                  ))}
                </div>
              </div>

              {/* Rule lifecycle state */}
              <div className="grid grid-cols-5 gap-4">
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Rule Name</div>
                  <div className="mt-1 font-semibold">Fact Find – Source Question</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Version</div>
                  <div className="mt-1 font-semibold">v1.2</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Stage</div>
                  <div className="mt-1 font-semibold">Active Calibration</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Run Count</div>
                  <div className="mt-1 font-semibold">2</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Last Lever Used</div>
                  <div className="mt-1 font-semibold">Structural Pattern Coverage</div>
                </div>
              </div>

              {/* KPI row */}
              <div className="grid grid-cols-5 gap-4">
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Detection Accuracy</div>
                  <div className="mt-1 text-2xl font-bold text-emerald-600">82%</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Mismatches</div>
                  <div className="mt-1 text-2xl font-bold text-rose-600">{mismatchCount}</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Manager Queries</div>
                  <div className="mt-1 text-2xl font-bold text-amber-600">1</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Stability Score</div>
                  <div className="mt-1 text-2xl font-bold text-slate-900">Medium</div>
                </div>
                <div className="rounded-xl border bg-white p-4">
                  <div className="text-xs text-slate-500">Loop Progress</div>
                  <div className="mt-2 h-2 rounded-full bg-slate-200">
                    <div className="h-2 w-[60%] rounded-full bg-pink-600" />
                  </div>
                  <div className="mt-2 text-sm text-slate-500">Run 2 of expected 3–6</div>
                </div>
              </div>



              {/* Lever timeline + governance */}
              <div className="grid grid-cols-2 gap-6">

Advisor question containing the following token groups:

QUESTION_WORD
+
DISCOVERY_VERB
+
OBJECT_REFERENCE

where

hear
see

Token Group 3 — Object Reference

the site
storage vault
our storage
the company
it
that
this

Tokens must appear in the following order within the same advisor sentence:

QUESTION_WORD
→ DISCOVERY_VERB
→ OBJECT_REFERENCE

Additional words may appear between tokens.

Examples That Should Trigger
How did you find us?
Where did you hear about us?
How did you discover the company?
Where did you find that?
How did you see it?
Pattern 2 — Source Confirmation Question

Advisor question referencing a source channel and a discovery verb.

google
website

advertisement

signage
recommendation
referral
Token Group 2 — Discovery Verb

find
found

Token order may follow either structure:

SOURCE_REFERENCE → DISCOVERY_VERB

or

DISCOVERY_VERB → SOURCE_REFERENCE
Examples That Should Trigger

Discovery pattern:

How did you find us?
Where did you hear about us?
How did you discover the company?
Where did you find that?

Confirmation pattern:

Was it online you saw us?
Did you see us on Google?
Was it a recommendation you heard about us through?

Customer sentence containing:

DISCOVERY_VERB
+
OBJECT_REFERENCE
DISCOVERY_VERB tokens

find
saw
seen
heard
hear
came across
noticed
OBJECT_REFERENCE tokens
you
the site
storage vault
the company
it
that
this
here

DISCOVERY_VERB → OBJECT_REFERENCE

USAGE_VERB

Pattern 3 — Pass-By Discovery

Customer sentence containing:

PASSING_VERB
+
OBJECT_REFERENCE
PASSING_VERB tokens
drove past

pass

Signal C
