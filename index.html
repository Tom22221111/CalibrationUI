<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrix Calibration Workbench</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX transpilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#FF2E88',
              'accent-hover': '#E02674',
              'accent-soft': '#FFF0F6',
              'metrix-bg': '#F6F7FB',
              'metrix-border': '#E6E8F0',
              'metrix-text': '#0F172A',
              'metrix-muted': '#4B5563'
            },
            borderRadius: {
              'premium': '14px'
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F6F7FB;
            color: #0F172A;
        }
        .premium-card {
          background: #FFFFFF;
          border: 1px solid #E6E8F0;
          border-radius: 14px;
          box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useMemo, useState } = React;

        /* =========================
           MOCK DATA
        ========================= */

        const candidateQuotesMock = [
          {
            quote: "Yeah, well, I'm going to have a word with her, see what she thinks.",
            signalA: false,
            signalB: true,
            signalC: false,
          },
          {
            quote: "No, because I'll get back to you quickly.",
            signalA: false,
            signalB: true,
            signalC: false,
          },
          {
            quote:
              "If I don't hear back after you spoke to your daughter, I'll give you a wee follow‑up call.",
            signalA: false,
            signalB: false,
            signalC: true,
          },
        ];

        const tenCalls = [
          { id: "Call 01", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 02", expected: "Detect", actual: "Not Detect", status: "Mismatch" },
          { id: "Call 03", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 04", expected: "Do Not Detect", actual: "Detect", status: "Mismatch" },
          { id: "Call 05", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 06", expected: "Detect", actual: "Not Detect", status: "Mismatch" },
          { id: "Call 07", expected: "Do Not Detect", actual: "Do Not Detect", status: "Correct" },
          { id: "Call 08", expected: "Detect", actual: "Detect", status: "Correct" },
          { id: "Call 09", expected: "Do Not Detect", actual: "Detect", status: "Manager Query" },
          { id: "Call 10", expected: "Detect", actual: "Detect", status: "Correct" },
        ];

        /* =========================
           UI HELPERS
        ========================= */

        function Badge({ status }) {
          const map = {
            Correct: "bg-emerald-50 text-emerald-700 border-emerald-200",
            Mismatch: "bg-rose-50 text-rose-700 border-rose-200",
            "Manager Query": "bg-amber-50 text-amber-700 border-amber-200",
            TRUE: "bg-emerald-50 text-emerald-700 border-emerald-200",
            FALSE: "bg-rose-50 text-rose-700 border-rose-200",
            Ready: "bg-emerald-50 text-emerald-700 border-emerald-200",
            Missing: "bg-rose-50 text-rose-700 border-rose-200",
            Dynamic: "bg-pink-50 text-pink-700 border-pink-200",
          };

          return (
            <span
              className={`rounded-full px-2 py-0.5 text-[11px] font-bold border ${
                map[status] || "bg-slate-100 text-slate-600 border-slate-200"
              }`}
            >
              {status}
            </span>
          );
        }

        /* =========================
           SIDEBAR
        ========================= */

        function Sidebar({ page, setPage }) {
          const items = [
            "Detection Flow",
            "Onboarding Wizard",
            "Dashboard",
            "Pattern Library",
            "Lever Matrix",
          ];

          return (
            <div className="w-64 border-r border-metrix-border bg-white p-6 shrink-0 h-screen sticky top-0">
              <div className="mb-8 flex items-center gap-2">
                <div className="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-white font-bold text-xl">M</div>
                <div className="text-xl font-black text-metrix-text tracking-tight uppercase italic">Metrix</div>
              </div>
              <div className="space-y-1">
                {items.map((i) => (
                  <div
                    key={i}
                    onClick={() => setPage(i)}
                    className={`cursor-pointer rounded-xl px-4 py-2.5 text-sm transition-all duration-200 ${
                      page === i 
                        ? "bg-accent-soft text-accent font-bold shadow-sm" 
                        : "text-metrix-muted hover:bg-metrix-bg hover:text-metrix-text"
                    }`}
                  >
                    {i}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        /* =========================
           ONBOARDING WIZARD
        ========================= */

        const wizardSteps = [
          "Add Rule(s)",
          "Pattern Classification",
          "Rule Engineering",
          "Keyword Retrieval",
          "Client Example Coverage",
          "Onboarding Complete",
        ];

        function WizardPage() {
          const [step, setStep] = useState(0);
          const pct = ((step + 1) / wizardSteps.length) * 100;

          const stepContent = [
            {
              title: "Add Detection Rule(s)",
              subtitle: "Paste a single rule or upload a CSV containing many rules at once.",
              body: (
                <div className="grid gap-6 lg:grid-cols-2">
                  <div className="premium-card p-6">
                    <div className="mb-2 text-xs font-bold uppercase tracking-wider text-metrix-muted">Paste Single Rule</div>
                    <textarea
                      className="h-40 w-full rounded-xl border border-metrix-border bg-metrix-bg p-4 text-sm focus:outline-accent"
                      defaultValue="Detect whether the advisor asks the customer how they found the company."
                    />
                  </div>
                  <div className="premium-card p-6 border-dashed border-2 flex flex-col items-center justify-center text-metrix-muted">
                    <div className="mb-2 text-xs font-bold uppercase tracking-wider">Upload Multiple Rules</div>
                    <div className="text-metrix-muted/60 text-sm">Drop CSV here</div>
                  </div>
                </div>
              ),
            },
            {
              title: "Pattern Classification",
              subtitle: "The classifier assigns the rule to a conversational pattern family.",
              body: (
                <div className="grid gap-6 lg:grid-cols-2">
                  <div className="premium-card p-6">
                    <div className="text-xs font-bold uppercase tracking-wider text-metrix-muted">Suggested Pattern</div>
                    <div className="mt-2 text-2xl font-black text-metrix-text">Question Pattern</div>
                  </div>
                  <div className="premium-card p-6">
                    <div className="text-xs font-bold uppercase tracking-wider text-metrix-muted">If Pattern = OTHER</div>
                    <ul className="mt-3 list-disc space-y-2 pl-5 text-sm text-metrix-muted">
                      <li>Update pattern classification library</li>
                      <li>Create new pattern-specific prompt</li>
                      <li>Return to pattern output</li>
                    </ul>
                  </div>
                </div>
              ),
            },
            {
              title: "Deterministic Rule Engineering",
              subtitle: "Converts the raw rule into deterministic signal extraction logic.",
              body: (
                <div className="premium-card p-6">
                  <div className="rounded-xl bg-metrix-bg p-6 text-sm">
                    <div className="font-extrabold text-metrix-text mb-4 text-xs uppercase tracking-widest">Rule v1 Preview</div>
                    <div className="space-y-4">
                      <div>
                        <div className="text-accent font-bold border-b border-accent/20 mb-2">LAYER 1 — SIGNAL EXTRACTION</div>
                        <div className="font-mono text-metrix-muted">Signal A: QUESTION_WORD + DISCOVERY_VERB + OBJECT_REFERENCE</div>
                        <div className="font-mono text-metrix-muted">Signal B: SOURCE_REFERENCE + DISCOVERY_VERB</div>
                      </div>
                      <div>
                        <div className="text-accent font-bold border-b border-accent/20 mb-2">LAYER 2 — QUALIFICATION GATE</div>
                        <div className="font-mono text-metrix-muted">IF Signal A = TRUE OR Signal B = TRUE → rule_present = TRUE</div>
                      </div>
                    </div>
                  </div>
                </div>
              ),
            },
            {
              title: "Keyword Retrieval Layer",
              subtitle: "Generate Python retrieval hints to support pre-filtering.",
              body: (
                <div className="premium-card p-6">
                  <div className="flex flex-wrap gap-2">
                    {['how','find','found','source','website','online','google','looking','site','browsing'].map((k) => (
                      <span key={k} className="rounded-full bg-accent-soft border border-accent/20 px-3 py-1 text-xs font-bold text-accent">{k}</span>
                    ))}
                  </div>
                </div>
              ),
            },
            {
              title: "Client Example Coverage Mapping",
              subtitle: "Inject quote-level examples for audit and comparison.",
              body: (
                <div className="grid gap-6 lg:grid-cols-[0.8fr_1.2fr]">
                  <div className="premium-card p-6">
                    <div className="mb-3 text-xs font-bold uppercase tracking-wider text-metrix-muted">Requirements</div>
                    <ul className="list-disc space-y-2 pl-5 text-sm text-metrix-muted">
                      <li>Each row = one behavioural quote</li>
                      <li>Labels = SHOULD_DETECT / SHOULD_NOT_DETECT</li>
                      <li>No full transcripts</li>
                    </ul>
                  </div>
                  <div className="premium-card overflow-hidden">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-metrix-bg text-metrix-muted px-6">
                        <tr><th className="px-6 py-3">Example</th><th className="px-6 py-3">Label</th><th className="px-6 py-3">Gap</th></tr>
                      </thead>
                      <tbody>
                        <tr className="border-t border-metrix-border"><td className="px-6 py-3 font-bold">EX-01</td><td className="px-6 py-3 text-emerald-600 font-bold">DETECT</td><td className="px-6 py-3 text-emerald-600 font-bold italic">Covered</td></tr>
                        <tr className="border-t border-metrix-border"><td className="px-6 py-3 font-bold">EX-02</td><td className="px-6 py-3 text-rose-600 font-bold">DETECT</td><td className="px-6 py-3 text-amber-600 font-bold italic">Gap</td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              ),
            },
            {
              title: "Onboarding Complete",
              subtitle: "Rule ready for calibration queue.",
              body: (
                <div className="premium-card p-12 text-center bg-accent-soft/30">
                  <div className="text-2xl font-black text-metrix-text">Ready for Queue</div>
                  <p className="mt-2 text-metrix-muted max-w-sm mx-auto">The rule has completed setup and is ready to enter the calibration dashboard.</p>
                  <button className="mt-8 rounded-xl bg-accent px-8 py-3.5 font-black text-white shadow-xl shadow-accent/20 hover:bg-accent-hover transform transition active:scale-95">Send to Calibration Queue</button>
                </div>
              ),
            },
          ][step];

          return (
            <div className="space-y-10 p-10 max-w-5xl">
              <div>
                <h1 className="text-4xl font-black tracking-tight text-metrix-text">AI Onboarding Wizard</h1>
                <p className="mt-2 text-lg text-metrix-muted">Initial setup flow for steps 1–7.5.</p>
              </div>

              <div className="flex flex-wrap gap-2">
                {wizardSteps.map((label, i) => (
                  <div key={label} className={`rounded-lg px-3 py-1.5 text-xs font-bold border ${i === step ? 'bg-accent text-white border-accent' : 'bg-white text-metrix-muted border-metrix-border'}`}>
                    {i + 1}. {label}
                  </div>
                ))}
              </div>

              <div className="h-2 w-full rounded-full bg-metrix-border overflow-hidden shadow-inner">
                <div className="h-2 bg-accent shadow-[0_0_10px_rgba(255,46,136,0.5)] transition-all duration-700 ease-out" style={{ width: `${pct}%` }} />
              </div>

              <div>
                <h2 className="text-3xl font-black text-metrix-text tracking-tight">{stepContent.title}</h2>
                <p className="mt-1 text-metrix-muted text-lg">{stepContent.subtitle}</p>
                <div className="mt-8">{stepContent.body}</div>
              </div>

              <div className="flex justify-between pt-4 border-t border-metrix-border">
                <button disabled={step === 0} onClick={() => setStep(step - 1)} className="rounded-xl border border-metrix-border bg-white px-8 py-3 font-bold text-metrix-text shadow-sm hover:bg-metrix-bg disabled:opacity-30">Back</button>
                <button disabled={step === wizardSteps.length - 1} onClick={() => setStep(step + 1)} className="rounded-xl bg-metrix-text px-8 py-3 font-bold text-white shadow-lg hover:bg-black disabled:opacity-30">Continue</button>
              </div>
            </div>
          );
        }

        /* =========================
           DASHBOARD (RESTORED FEATURES)
        ========================= */

        function DashboardPage() {
          const [activeCall, setActiveCall] = useState(null);

          const mismatchCount = useMemo(
            () => tenCalls.filter((c) => c.status === "Mismatch").length,
            []
          );

          return (
            <div className="space-y-10 p-10 max-w-6xl">
              <div>
                <div className="badge-pink bg-accent-soft text-accent border border-accent/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest inline-block mb-3">Governance Dashboard</div>
                <h1 className="text-4xl font-black tracking-tight text-metrix-text">Calibration Command Centre</h1>
                <p className="mt-2 text-lg text-metrix-muted">Active rule lifecycle and 10-call testing view.</p>
              </div>

              <div className="grid grid-cols-5 gap-4">
                {[
                  { l: "Rule Name", v: "Fact Find – Source Question" },
                  { l: "Version", v: "v1.2" },
                  { l: "Stage", v: "Active Calibration" },
                  { l: "Run Count", v: "2" },
                  { l: "Last Lever", v: "Structural Pattern" }
                ].map((item) => (
                  <div key={item.l} className="premium-card p-5">
                    <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">{item.l}</div>
                    <div className="mt-1 font-extrabold text-metrix-text truncate">{item.v}</div>
                  </div>
                ))}
              </div>

              <div className="grid grid-cols-5 gap-4">
                <div className="premium-card p-5 border-l-4 border-emerald-500">
                  <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Accuracy</div>
                  <div className="mt-1 text-3xl font-black text-emerald-600">82%</div>
                </div>
                <div className="premium-card p-5 border-l-4 border-rose-500">
                  <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Mismatches</div>
                  <div className="mt-1 text-3xl font-black text-rose-600">{mismatchCount}</div>
                </div>
                <div className="premium-card p-5 border-l-4 border-amber-500">
                  <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Queries</div>
                  <div className="mt-1 text-3xl font-black text-amber-600">1</div>
                </div>
                <div className="premium-card p-5 border-l-4 border-slate-500">
                  <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Stability</div>
                  <div className="mt-1 text-3xl font-black text-metrix-text">Med</div>
                </div>
                <div className="premium-card p-5">
                  <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Loop Progress</div>
                  <div className="mt-3 h-2 rounded-full bg-metrix-bg relative overflow-hidden">
                    <div className="absolute top-0 left-0 h-full w-[60%] bg-pink-500" />
                  </div>
                  <div className="mt-2 text-[10px] text-metrix-muted font-bold font-mono uppercase tracking-wider">Run 2 of 3+</div>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-6">
                <div className="premium-card p-6">
                  <h2 className="mb-5 text-xl font-black text-metrix-text flex items-center gap-2">
                    <span className="w-1.5 h-6 bg-accent rounded-full inline-block"></span>
                    Signal Diagnostics
                  </h2>
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { l: "Failure Layer", v: "Signal Detection" },
                      { l: "Failed Signal", v: "Signal A" },
                      { l: "Classification", v: "Source Confirmation" },
                      { l: "Recommended Lever", v: "Structural Pattern" }
                    ].map(d => (
                      <div key={d.l} className="bg-metrix-bg p-3 rounded-xl border border-metrix-border">
                        <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted mb-1">{d.l}</div>
                        <div className="font-bold text-sm text-metrix-text">{d.v}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="premium-card p-6">
                  <h2 className="mb-5 text-xl font-black text-metrix-text flex items-center gap-2">
                    <span className="w-1.5 h-6 bg-accent rounded-full inline-block"></span>
                    Retrieval Diagnostics
                  </h2>
                  <div className="grid grid-cols-3 gap-3">
                    {[
                      { l: "Recall", v: "72%" },
                      { l: "Missed", v: "3" },
                      { l: "Last Hint", v: "website" }
                    ].map(d => (
                      <div key={d.l} className="bg-metrix-bg p-3 rounded-xl border border-metrix-border text-center">
                        <div className="text-[10px] font-black uppercase tracking-widest text-metrix-muted mb-1">{d.l}</div>
                        <div className="font-black text-lg text-metrix-text">{d.v}</div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-4 p-3 rounded-xl bg-accent-soft text-accent text-xs font-bold border border-accent/20">
                    Latest hint expansion: browsing / site / online
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-6">
                <div className="premium-card p-6">
                  <h2 className="mb-5 text-xl font-black text-metrix-text flex items-center gap-2">
                    <span className="w-1.5 h-6 bg-accent rounded-full inline-block"></span>
                    Coverage Heatmap
                  </h2>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                      <div className="text-[10px] font-black uppercase tracking-widest text-emerald-800 mb-1">Direct Discovery</div>
                      <div className="text-xl font-black text-emerald-700">100%</div>
                    </div>
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                      <div className="text-[10px] font-black uppercase tracking-widest text-amber-800 mb-1">Confirmation</div>
                      <div className="text-xl font-black text-amber-700">60%</div>
                    </div>
                    <div className="bg-rose-50 p-4 rounded-xl border border-rose-200">
                      <div className="text-[10px] font-black uppercase tracking-widest text-rose-800 mb-1">Referral</div>
                      <div className="text-xl font-black text-rose-700">40%</div>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <div className="text-[10px] font-black uppercase tracking-widest text-slate-800 mb-1">Pass-by</div>
                      <div className="text-xl font-black text-slate-700 font-mono">0%</div>
                    </div>
                  </div>
                </div>

                <div className="premium-card p-6">
                  <h2 className="mb-5 text-xl font-black text-metrix-text flex items-center gap-2">
                    <span className="w-1.5 h-6 bg-accent rounded-full inline-block"></span>
                    Pattern Expansion History
                  </h2>
                  <div className="space-y-3">
                    {[
                      { r: 1, c: "Added Confirmation Question Pattern" },
                      { r: 2, c: "Added Compound Object Reference" },
                      { r: 2, c: "Added Access-Driven Placement Logic" }
                    ].map((item, idx) => (
                      <div key={idx} className="flex gap-4 items-center">
                        <div className="w-16 shrink-0 bg-metrix-bg py-1 px-2 rounded-lg text-center text-[10px] font-black border border-metrix-border text-metrix-muted">RUN {item.r}</div>
                        <div className="text-sm font-bold text-metrix-text">{item.c}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="premium-card overflow-hidden">
                <div className="p-6 border-b border-metrix-border bg-metrix-bg/30">
                  <h2 className="text-xl font-black text-metrix-text">10 Call Calibration Run</h2>
                </div>
                <table className="w-full text-sm text-left">
                  <thead className="bg-metrix-bg/50 text-metrix-muted uppercase text-[10px] font-black tracking-widest">
                    <tr><th className="px-6 py-4">Call</th><th className="px-6 py-4">Expected</th><th className="px-6 py-4">Actual</th><th className="px-6 py-4">Status</th></tr>
                  </thead>
                  <tbody>
                    {tenCalls.map((c) => (
                      <tr key={c.id} className="cursor-pointer border-t border-metrix-border hover:bg-metrix-bg transition-colors" onClick={() => setActiveCall(c)}>
                        <td className="px-6 py-4 font-extrabold text-metrix-text">{c.id}</td>
                        <td className="px-6 py-4 text-metrix-muted font-bold tracking-tight">{c.expected}</td>
                        <td className="px-6 py-4 text-metrix-muted font-bold tracking-tight">{c.actual}</td>
                        <td className="px-6 py-4"><Badge status={c.status} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {activeCall && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#0F172A]/80 backdrop-blur-sm p-4" onClick={() => setActiveCall(null)}>
                  <div className="w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-[32px] bg-white p-10 shadow-3xl shadow-black/40 border border-metrix-border outline outline-offset-8 outline-accent/20" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-start mb-8">
                       <div>
                          <div className="badge-pink bg-rose-50 text-rose-600 border border-rose-200 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest mb-2 inline-block">Critical Drilldown</div>
                          <h3 className="text-3xl font-black text-metrix-text">{activeCall.id} Diagnosis</h3>
                       </div>
                       <button onClick={() => setActiveCall(null)} className="text-metrix-muted hover:text-black p-2"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    </div>
                    <div className="space-y-6">
                      <div className="text-xs font-black uppercase tracking-widest text-metrix-muted border-b border-metrix-border pb-2">Step 0 — Retrieval Recall Analysis</div>
                      {candidateQuotesMock.map((q, i) => (
                        <div key={i} className="p-6 rounded-2xl bg-metrix-bg border border-metrix-border group hover:border-accent transition-colors">
                          <p className="italic text-lg text-metrix-text font-medium mb-4 leading-relaxed">"{q.quote}"</p>
                          <div className="flex gap-4 items-center">
                            <div className="flex gap-2 items-center">
                              <span className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Signal A</span>
                              <Badge status={q.signalA ? "TRUE" : "FALSE"} />
                            </div>
                            <div className="w-px h-4 bg-metrix-border"></div>
                            <div className="flex gap-2 items-center">
                              <span className="text-[10px] font-black uppercase tracking-widest text-metrix-muted">Signal B</span>
                              <Badge status={q.signalB ? "TRUE" : "FALSE"} />
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        /* =========================
           DETECTION RULE LIFECYCLE (ADAPTED TO LIGHT THEME)
        ========================= */

        function DetectionRuleLifecycleDashboard() {
          const flowSteps = [
            { id: '1', title: 'Customer Detection Rule Content Raw', body: 'Initial behavioural rule content is defined from the customer requirement.' },
            { id: '2', title: 'Pattern Classifier (Prompt)', body: 'The raw rule content is classified into a known conversational pattern family.', branch: { title: 'IF Pattern = OTHER', items: ['Pattern Ontology Expansion', 'Update Pattern Classification Library', 'Create New Pattern-Specific Engineering Prompt', 'Return to Step 3'] } },
            { id: '3', title: 'Pattern Type Output', body: 'The behavioural pattern type is formally output for downstream rule engineering.' },
            { id: '4', title: 'Pattern-Specific Engineering Prompt (Prompt)', body: 'The correct engineering framework is applied based on the classified pattern family.' },
            { id: '5', title: 'Deterministic Rule Created v1', body: 'The first deterministic version of the rule is generated.' },
            { id: '6', title: 'Keyword Hints Generation (Prompt)', body: 'Retrieval hints are generated to support Python-based pre-filtering before AI analysis.' },
            { id: '7', title: 'Keywords Created (Python retrieval layer)', body: 'The retrieval layer uses generated keywords to surface candidate quotes efficiently.' },
            { id: '7.5', title: 'Client Example Coverage Mapping (Prompt)', body: 'Client examples are injected in structured quote-level format.', note: 'NOTE — Client examples must be injected in structured quote-level format.', table: { headers: ['Example ID', 'Label', 'Speaker', 'Quote', 'Context'], rows: [['1', 'SHOULD_DETECT', 'Advisor', '“So I’ll reserve that now”', 'Booking secured'], ['2', 'SHOULD_NOT_DETECT', 'Advisor', '“You can call back later”', 'No reservation']] }, rules: ['Each row = single behavioural quote', 'Labels must be binary (SHOULD_DETECT / SHOULD_NOT_DETECT)', 'Do NOT provide full transcripts', 'Do NOT provide narrative summaries', 'Context optional but recommended'], ensures: ['Deterministic coverage audit', 'Structural comparison possible', 'Calibration loops reduced'] },
            { id: '8', title: 'Test on 10 Calls', body: 'The rule is tested against a controlled sample of real conversations.' },
            { id: '9', title: 'Mismatch Identified', body: 'Observed output is compared to expected behaviour and mismatches are isolated.' },
            { id: '10', title: 'Calibration Mismatch Diagnosis (Prompt)', body: 'A structured diagnosis identifies whether the issue is retrieval, signal, qualification, or policy-related.', branch: { title: 'IF Policy Ambiguity', items: ['QUERY_FOR_MANAGER', 'Manager Decision', 'Return to Step 11 OR Close'] } },
            { id: '11', title: 'Lever Adjustment in Isolation', body: 'Only one calibration lever is adjusted at a time to preserve deterministic stability.' },
            { id: '11.5', title: 'Pattern Library Update', body: 'If structural coverage is expanded, the pattern library is updated manually.', helper: '(if structural coverage expanded)' },
            { id: '12', title: 'Deterministic Rule Created v1.1', body: 'An updated rule version is generated after the isolated calibration change.' },
            { id: '13', title: 'Re-run Test', body: 'The updated rule is re-tested against the sample set.', repeat: 'Repeat calibration loop until stable' },
            { id: '14', title: 'Detection Sign-off Report', body: 'Final validated rule is approved for production use.' },
          ];

          return (
            <div className="mx-auto max-w-4xl px-4 py-10">
              <div className="mb-10 p-10 rounded-[32px] border border-metrix-border bg-white shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 right-0 w-64 h-64 bg-accent-soft/50 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl"></div>
                <div className="badge-pink bg-accent text-white border-0 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest inline-block mb-4 relative z-10 shadow-lg shadow-accent/20">Metrix Pipeline</div>
                <h1 className="text-5xl font-black tracking-tight text-metrix-text mb-4 relative z-10 italic">Detection Rule<br/>Calibration Lifecycle</h1>
                <p className="text-metrix-muted text-xl max-w-2xl relative z-10 font-medium">Visualizing the deterministic path from raw customer content to production-ready AI signal detection.</p>
              </div>

              <div className="space-y-6">
                {flowSteps.map((step, index) => (
                  <div key={step.id}>
                    <div className="premium-card p-8 group hover:border-accent/40 transition-all duration-300 relative">
                      <div className="flex items-start gap-6">
                        <div className="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl border border-accent/20 bg-accent text-lg font-black text-white shadow-xl shadow-accent/20 group-hover:scale-110 transition-transform">{step.id}</div>
                        <div className="min-w-0 flex-1">
                          <h2 className="text-2xl font-black text-metrix-text tracking-tight group-hover:text-accent transition-colors">{step.title}</h2>
                          {step.helper && <div className="mt-1 text-xs uppercase tracking-widest font-black text-metrix-muted/60">{step.helper}</div>}
                          <p className="mt-4 text-metrix-muted text-lg leading-relaxed font-medium">{step.body}</p>
                          
                          {step.note && <div className="mt-6 rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 text-sm font-bold text-amber-900 shadow-sm">{step.note}</div>}
                          
                          {step.branch && (
                            <div className="mt-6 rounded-2xl border border-metrix-border bg-metrix-bg/50 p-6">
                              <div className="text-xs font-black uppercase tracking-widest text-metrix-muted mb-4 flex items-center gap-2 italic">
                                <span className="w-1.5 h-1.5 rounded-full bg-accent"></span>
                                {step.branch.title}
                              </div>
                              <div className="space-y-2">
                                {step.branch.items.map((item, idx) => (
                                  <div key={item} className="flex items-center gap-4 rounded-xl border border-metrix-border bg-white px-4 py-3 text-sm font-bold text-metrix-text shadow-sm hover:translate-x-1 transition-transform">
                                    <div className="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-accent-soft text-[10px] font-black text-accent">{idx + 1}</div>
                                    <span>{item}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {step.table && (
                            <div className="mt-6 overflow-hidden rounded-2xl border border-metrix-border bg-white shadow-md">
                              <div className="overflow-x-auto">
                                <table className="min-w-full text-xs text-left">
                                  <thead className="bg-metrix-bg text-metrix-muted font-black border-b border-metrix-border italic px-4">
                                    <tr>{step.table.headers.map(h => <th key={h} className="px-5 py-3 uppercase tracking-tighter">{h}</th>)}</tr>
                                  </thead>
                                  <tbody className="font-bold">
                                    {step.table.rows.map((r, i) => (
                                      <tr key={i} className="border-t border-metrix-border text-metrix-text hover:bg-metrix-bg/20">
                                        {r.map((c, j) => <td key={j} className="px-5 py-4 whitespace-nowrap">{c}</td>)}
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          {step.rules && (
                            <div className="mt-8 grid gap-6 lg:grid-cols-2">
                                <div className="p-6 rounded-2xl border border-metrix-border bg-metrix-bg/30">
                                    <div className="text-[10px] font-black uppercase tracking-[0.2em] text-metrix-muted mb-4 border-b border-metrix-border pb-2">Mandatory Rules</div>
                                    <div className="space-y-3">{step.rules.map(r => <div key={r} className="text-sm font-bold text-metrix-text flex items-start gap-3"><div className="w-1.5 h-1.5 rounded-full bg-accent mt-1.5 shrink-0"></div>{r}</div>)}</div>
                                </div>
                                <div className="p-6 rounded-2xl border border-emerald-200 bg-emerald-50">
                                    <div className="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-800 mb-4 border-b border-emerald-200 pb-2">Outcome Assurance</div>
                                    <div className="space-y-3">{step.ensures.map(e => <div key={e} className="text-sm font-bold text-emerald-900 flex items-start gap-3"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 mt-1.5 shrink-0"></div>{e}</div>)}</div>
                                </div>
                            </div>
                          )}

                          {step.repeat && (
                            <div className="mt-6 rounded-2xl border border-accent/20 bg-accent-soft px-5 py-4 text-xs font-black text-accent inline-flex items-center gap-3 uppercase tracking-[0.1em] shadow-sm animate-pulse">
                              <span className="text-xl">🔄</span> {step.repeat}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                    {index < flowSteps.length - 1 && (
                      <div className="flex justify-center py-4">
                        <div className="flex flex-col items-center gap-1 opacity-20 group transition-opacity hover:opacity-100">
                          <div className="h-10 w-1 bg-accent rounded-full mb-1"></div>
                          <div className="text-accent text-3xl font-black">↓</div>
                          <div className="h-4 w-1 bg-accent/40 rounded-full"></div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        /* =========================
           PATTERN LIBRARY
        ========================= */

        function PatternLibraryPage() {
          const rows = [
            ["Question Pattern", "Ready", "Discovery, qualification, probing"],
            ["Recommendation Pattern", "Ready", "Advice, product suggestions"],
            ["Commitment / Next Step", "Ready", "Reservations, callbacks, follow-up"],
            ["Benefit Link Pattern", "Ready", "Feature → outcome explanation"],
            ["OTHER", "Dynamic", "New ontology expansion path"],
          ];
          return (
            <div className="p-10 max-w-5xl">
              <h1 className="text-4xl font-black mb-3 text-metrix-text tracking-tight italic">Pattern Classification</h1>
              <p className="text-lg text-metrix-muted mb-10 font-medium">Families available to the automated classifier.</p>
              <div className="premium-card overflow-hidden">
                <table className="w-full text-sm text-left">
                  <thead className="bg-metrix-bg text-metrix-muted font-black border-b border-metrix-border">
                    <tr><th className="px-8 py-5">Pattern Family</th><th className="px-8 py-5">Status</th><th className="px-8 py-5">Purpose</th></tr>
                  </thead>
                  <tbody>
                    {rows.map(row => (
                      <tr key={row[0]} className="border-t border-metrix-border hover:bg-metrix-bg/30">
                        <td className="px-8 py-5 font-black text-metrix-text italic">{row[0]}</td>
                        <td className="px-8 py-5"><Badge status={row[1] === "Ready" ? "Ready" : "Dynamic"} /></td>
                        <td className="px-8 py-5 text-metrix-muted font-bold">{row[2]}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        /* =========================
           LEVER MATRIX
        ========================= */

        function LeverMatrixPage() {
          const rows = [
            ["Word List Expansion", "Rule doesn't recognise a synonym", "Add 'discover' to discovery group"],
            ["New Sentence Structure", "Order variation (order, spreading)", "Add confirmation question pattern"],
            ["Generic Object Words", "Use of 'it' or 'that' instead of name", "Allow object-relative tokens"]
          ];
          return (
            <div className="p-10 max-w-5xl">
              <h1 className="text-4xl font-black mb-3 text-metrix-text tracking-tight italic">Calibration Levers</h1>
              <p className="text-lg text-metrix-muted mb-10 font-medium">Deterministic adjustments applied during mismatch correction.</p>
              <div className="grid gap-6">
                {rows.map(row => (
                  <div key={row[0]} className="premium-card p-10 flex gap-10 items-center group hover:bg-accent-soft/20 transition-all border-l-8 border-l-accent">
                    <div className="w-1/3">
                      <div className="text-accent font-black text-xs uppercase tracking-widest mb-2">Lever Strategy</div>
                      <div className="text-2xl font-black text-metrix-text tracking-tighter leading-none italic">{row[0]}</div>
                    </div>
                    <div className="flex-1">
                      <div className="text-metrix-muted font-black text-[10px] uppercase tracking-widest mb-2">Problem / Solution</div>
                      <div className="text-metrix-text font-bold text-lg mb-1">{row[1]}</div>
                      <div className="text-metrix-muted font-bold text-sm bg-metrix-bg/50 px-3 py-1 rounded-lg border border-metrix-border inline-block italic">Example: {row[2]}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        /* =========================
           MAIN
        ========================= */

        function MetrixCalibrationWorkbench() {
          const [page, setPage] = useState("Detection Flow");

          return (
            <div className="flex min-h-screen bg-metrix-bg selection:bg-accent selection:text-white">
              <Sidebar page={page} setPage={setPage} />
              <div className="flex-1">
                {page === "Detection Flow" && <DetectionRuleLifecycleDashboard />}
                {page === "Onboarding Wizard" && <WizardPage />}
                {page === "Dashboard" && <DashboardPage />}
                {page === "Pattern Library" && <PatternLibraryPage />}
                {page === "Lever Matrix" && <LeverMatrixPage />}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MetrixCalibrationWorkbench />);
    </script>
</body>
</html>
